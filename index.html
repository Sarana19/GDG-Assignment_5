<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up Form</title>
</head>
<body>

    <h1>Sign Up</h1>

    <form action="#" method="post" novalidate>

        <!-- Personal Info -->
        <fieldset>
            <legend>Personal Information</legend>

            <label>Full Name:</label><br>
            <input type="text" name="fullname" required minlength="3" maxlength="20"><br><br>

            <label>Email:</label><br>
            <input type="email" name="email" required autocomplete="email"><br><br>

            <label>Password:</label><br>
            <input type="password" name="password" required minlength="8"><br><br>

            <label>Phone:</label><br>
            <input type="tel" name="phone" placeholder="Enter your phone number"><br><br>

            <label>Website:</label><br>
            <input type="url" name="website"><br><br>

            <label>Birth Date:</label><br>
            <input type="date" name="birthdate" min="1990-01-01" max="2025-12-31"><br><br>

        </fieldset>

        <!-- Gender -->
        <fieldset>
            <legend>Gender</legend>

            <input type="radio" name="gender" value="male"> Male<br>
            <input type="radio" name="gender" value="female"> Female<br>
            <input type="radio" name="gender" value="other"> Other<br>

        </fieldset>

        <br>

        <!-- Preferences -->
        <fieldset>
            <legend>Preferences</legend>

            <label>
                <input type="checkbox" name="newsletter"> Subscribe to Newsletter
            </label><br><br>

            <label>Country:</label><br>
            <select name="country">
                <option value="">Select Country</option>
                <option>Egypt</option>
                <option>USA</option>
                <option>UK</option>
                <option>Germany</option>
            </select><br><br>

            <label>Favorite Language:</label><br>
            <input list="languages" name="favlang">
            <datalist id="languages">
                <option value="HTML">
                <option value="CSS">
                <option value="JavaScript">
                <option value="Python">
            </datalist>

        </fieldset>

        <br>

        <!-- Buttons -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
